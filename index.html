<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notas do Marquinhos</title>
    <meta name="description" content="Apresentações e materiais de Marcos Miotto, acessíveis de qualquer lugar.">
    <meta name="theme-color" content="#0e1210">

    <!-- Tipografia: Inter (leitura) + JetBrains Mono (labels) — mesma
         identidade visual dos demais subdomínios (miotto.dev, marcos.miotto.dev). -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    >

    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <a class="skip-link" href="#conteudo">Pular para o conteúdo</a>

    <header class="site-header">
      <div class="container">
        <a class="brand" href="https://miotto.dev">notes<span>.miotto.dev</span></a>
        <nav class="site-nav" aria-label="Navegação">
          <a href="https://marcos.miotto.dev">portfólio</a>
        </nav>
      </div>
    </header>

    <main id="conteudo">
      <section class="hero">
        <div class="container">
          <p class="hero-prompt">
            <span class="prompt-symbol">$</span> ls slides/<span class="cursor" aria-hidden="true"></span>
          </p>
          <h1>Minhas notas</h1>
          <p class="intro">Minhas apresentações e anotações acessíveis em qualquer lugar do mundo.</p>
        </div>
      </section>

      <section aria-label="Lista de apresentações">
        <div class="container">
          <!-- Cards gerados por js/main.js a partir de js/notes.js -->
          <div class="links" id="notes-list"></div>

          <noscript>
            <p>
              Este site usa JavaScript para listar as notas. Sem ele, os links não aparecem aqui
              — veja o <a href="https://github.com/markinkkkkj/miotto-notes" rel="noopener">código-fonte</a>.
            </p>
          </noscript>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>© <span id="year"></span> Marcos Miotto · <a href="https://github.com/markinkkkkj" rel="noopener">github.com/markinkkkkj</a></p>
      </div>
    </footer>

    <script src="js/notes.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
